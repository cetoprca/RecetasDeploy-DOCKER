name: RecetasApp-DES
services:

  backend:
    build:
      context: ../RecetasAPI-SpringBoot
    volumes:
      - ../RecetasAPI-SpingBoot:/app
      - maven-cache:/root/.m2
    ports:
      - "8080:8080"

    working_dir: /app
    command: ./mvnw spring-boot:run

    depends_on:
      - db

  frontend:
    build:
      context: ../RecetasFront-Angular
    volumes:
      - ../RecetasFront-Angular:/app
      - /app/node_modules
    ports:
        - "4200:4200"
    working_dir: /app
    command: npm start -- --host 0.0.0.0

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: recetasapi
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql


  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mysql-data:
  maven-cache: